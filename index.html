<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- fuente principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
   <title>Proyecto ft76</title>
</head>

<body>
    <header>
        <nav class="nav">
            <span class="nav__logo">Colorfly Studio</span>

            <ul class="nav__links">
                <li><a class="nav__link" href="#generador">Generador</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="generador">
            <h2>Generar paleta</h2>

            <div class="controles">
                <button class="boton boton--primario" id="generar">
                    Generar paleta
                </button>

                <div class="controles__campo">
                    <label class="controles__label" for="cantidad">
                        Cantidad colores
                    </label>

                    <select class="select" id="cantidad">
                        <option value="6">6 colores</option>
                        <option value="8">8 colores</option>
                        <option value="9">9 colores</option>
                    </select>
                </div>
            </div>

            <section class="galeria" id="galeria"></section>
        </section>
    </main>

    <footer>
        <p>© 2026 Colorfly Studio.</p>
    </footer>

    <script src="./js/script.js" defer></script>
</body>
</html>
